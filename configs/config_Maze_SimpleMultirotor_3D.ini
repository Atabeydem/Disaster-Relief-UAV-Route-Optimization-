[options]
env_name = SimpleAvoid
dynamic_name = Multirotor

navigation_3d = True
using_velocity_state = False
reward_type = reward_final

;depth, lgmd, vector
perception = depth

algo = PPO
total_timesteps = 100000

policy_name = CNN_GAP
net_arch = [64, 64]
activation_function = relu
cnn_feature_num = 48

keyboard_debug = False
generate_q_map = True
q_map_save_steps = 10000

use_wandb = False

[wandb]
name = Maze-3D-mlp-tanh-M3
notes = test

[environment]
max_depth_meters = 15
screen_height = 60
screen_width = 90

crash_distance = 2
accept_radius = 2

[multirotor]
dt = 0.1
acc_xy_max = 2.0
v_xy_max = 5
v_xy_min = 0.5
v_z_max = 2.0 
yaw_rate_max_deg = 30.0

; configs for DRL algorithms
[DRL]
gamma = 0.99
learning_rate = 3e-4
learning_starts = 5000
buffer_size = 50000
batch_size = 128
train_freq = 512
gradient_steps = 512
action_noise_sigma = 0.0
